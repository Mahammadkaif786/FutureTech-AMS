<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - FutureTech Computer Institute</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 700;
            color: #ef4444;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .btn-home {
            background-color: #1e40af;
            border-color: #1e40af;
            color: #ffffff;
            font-weight: 500;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-home:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">500</div>
        <h3 class="fw-bold mb-3">Internal Server Error</h3>
        <p class="text-muted mb-4">Something went wrong on our servers. We are looking into the issue. Please try refreshing the page or contact the administrator if the issue persists.</p>
        <a href="/" class="btn btn-home">Back to Safety</a>
    </div>
</body>
</html>
